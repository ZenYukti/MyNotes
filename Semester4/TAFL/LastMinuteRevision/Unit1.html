/* ---- Convert **bold** and $LaTeX$ in a string to HTML ---- */
const renderText = (text) => {
  let html = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\$([^$]+?)\$/g, (_, tex) => {
    try { return katex.renderToString(tex, { throwOnError: false, displayMode: false }); }
    catch (e) { return '$' + tex + '$'; }
  });
  return html;
};

/* ---- Render a single bullet ---- */
const Bullet = ({ text }) => {
  const html = renderText(text);
  if (text.startsWith("|")) {
    return <span className="block font-mono text-sm whitespace-pre" dangerouslySetInnerHTML={{ __html: html }} />;
  }
  return <p className="leading-relaxed" dangerouslySetInnerHTML={{ __html: '• ' + html }} />;
};

      <circle cx="400" cy="82" r="32" fill="#faf5ff" stroke="#7e22ce" strokeWidth="2" />
      <text x="400" y="77" textAnchor="middle" fontSize="13" fontWeight="bold" fill="#334155">q₁</text>
      <line x1="378" y1="83" x2="422" y2="83" stroke="#a855f7" strokeWidth="0.8" strokeDasharray="3,2" />
      <text x="400" y="98" textAnchor="middle" fontSize="11" fontWeight="bold" fill="#7e22ce">λ = 1</text>
      {/* self-loop q0 "0" */}
      <path d="M88,52 C78,0 122,0 112,52" fill="none" stroke="#475569" strokeWidth="1.5" markerEnd="url(#am)" />
      <text x="100" y="8" textAnchor="middle" fontSize="12" fontWeight="bold" fill="#1e40af">0</text>
      {/* self-loop q1 "0" */}
      <path d="M388,52 C378,0 422,0 412,52" fill="none" stroke="#475569" strokeWidth="1.5" markerEnd="url(#am)" />
      <text x="400" y="8" textAnchor="middle" fontSize="12" fontWeight="bold" fill="#1e40af">0</text>
      {/* q0 → q1 "1" curved above */}
      <path d="M130,68 Q250,28 368,68" fill="none" stroke="#475569" strokeWidth="1.5" markerEnd="url(#am)" />
      <text x="250" y="40" textAnchor="middle" fontSize="12" fontWeight="bold" fill="#1e40af">1</text>
      {/* q1 → q0 "1" curved below */}
      <path d="M370,98 Q250,152 132,98" fill="none" stroke="#475569" strokeWidth="1.5" markerEnd="url(#am)" />
      <text x="250" y="145" textAnchor="middle" fontSize="12" fontWeight="bold" fill="#1e40af">1</text>
    </svg>
  </div>
);

/* ---- 4. Mealy Machine — parity of 1s ---- */
const MealyDiagram = () => (
  <div className="my-4 flex justify-center">
    <svg viewBox="0 0 500 165" className="w-full max-w-lg">
      <ArrowMarker id="ay" />
      {/* start arrow */}
      <line x1="15" y1="82" x2="70" y2="82" stroke="#475569" strokeWidth="1.5" markerEnd="url(#ay)" />
      <text x="12" y="70" fontSize="11" fill="#94a3b8" fontStyle="italic">start</text>
      {/* q0 */}
      <circle cx="100" cy="82" r="28" fill="#faf5ff" stroke="#7e22ce" strokeWidth="2" />
      <text x="100" y="87" textAnchor="middle" fontSize="14" fontWeight="bold" fill="#334155">q₀</text>
      {/* q1 */}
      <circle cx="400" cy="82" r="28" fill="#faf5ff" stroke="#7e22ce" strokeWidth="2" />
      <text x="400" y="87" textAnchor="middle" fontSize="14" fontWeight="bold" fill="#334155">q₁</text>
      {/* self-loop q0 "0/0" */}
      <path d="M88,56 C78,2 122,2 112,56" fill="none" stroke="#475569" strokeWidth="1.5" markerEnd="url(#ay)" />
      <text x="100" y="10" textAnchor="middle" fontSize="11" fontWeight="bold" fill="#1e40af">0 / 0</text>
      {/* self-loop q1 "0/1" */}
      <path d="M388,56 C378,2 422,2 412,56" fill="none" stroke="#475569" strokeWidth="1.5" markerEnd="url(#ay)" />
      <text x="400" y="10" textAnchor="middle" fontSize="11" fontWeight="bold" fill="#1e40af">0 / 1</text>
      {/* q0 → q1 "1/1" curved above */}
      <path d="M126,68 Q250,22 372,68" fill="none" stroke="#475569" strokeWidth="1.5" markerEnd="url(#ay)" />
      <text x="250" y="36" textAnchor="middle" fontSize="11" fontWeight="bold" fill="#1e40af">1 / 1</text>
      {/* q1 → q0 "1/0" curved below */}
      <path d="M372,98 Q250,152 128,98" fill="none" stroke="#475569" strokeWidth="1.5" markerEnd="url(#ay)" />
      <text x="250" y="145" textAnchor="middle" fontSize="11" fontWeight="bold" fill="#1e40af">1 / 0</text>
    </svg>
  </div>
);

/* Diagram lookup */
const DIAGRAMS = { dfa: DFADiagram, nfa: NFADiagram, moore: MooreDiagram, mealy: MealyDiagram };

/* ---- Block = one Box with heading + bullets + optional diagram ---- */
const Block = ({ data }) => {
  const Diagram = data.diagram ? DIAGRAMS[data.diagram] : null;
  return (
    <Box type={data.type} title={data.heading}>
      {Diagram && <Diagram />}
      {data.bullets.map((b, i) => <Bullet key={i} text={b} />)}
    </Box>
  );
};

/* ---- Collapsible Section ---- */
const Section = ({ data }) => {
  const [open, setOpen] = useState(!!data.defaultOpen);
  return (
    <div className="bg-white rounded-lg shadow mb-5 overflow-hidden">
      <button
        onClick={() => setOpen(!open)}
        className="w-full px-5 py-4 bg-slate-800 text-white font-bold text-lg flex items-center justify-between hover:bg-slate-700 transition-colors"
      >
        <span>{data.title}</span>
        {open ? <ChevronDown className="w-5 h-5" /> : <ChevronRight className="w-5 h-5" />}
      </button>
      {open && (
        <div className="p-5">
          {data.blocks.map((b, i) => <Block key={i} data={b} />)}
        </div>
      )}
    </div>
  );
};

/* ================================================================
   APP
   ================================================================ */
const App = () => {
  return (
    <div className="max-w-4xl mx-auto px-4 py-8">

      {/* ---- Header ---- */}
      <header className="text-center mb-8">
        <h1 className="text-4xl font-extrabold text-slate-800 mb-1">Theory of Automata</h1>
        <h2 className="text-xl font-semibold text-slate-500">Unit 1 — Last Minute Revision</h2>
        <p className="mt-2 text-sm text-slate-400 tracking-wide">ZenYukti &middot; Quick-Reference Sheet</p>
      </header>

      {/* ---- Color Legend ---- */}
      <div className="flex flex-wrap gap-3 justify-center mb-8 text-xs font-semibold">
        <span className="px-3 py-1 rounded bg-yellow-100 text-yellow-800 border border-yellow-300">Definitions</span>
        <span className="px-3 py-1 rounded bg-blue-100 text-blue-800 border border-blue-300">DFA / NFA Logic</span>
        <span className="px-3 py-1 rounded bg-green-100 text-green-800 border border-green-300">Conversions / Math</span>
        <span className="px-3 py-1 rounded bg-purple-100 text-purple-800 border border-purple-300">Moore / Mealy</span>
        <span className="px-3 py-1 rounded bg-red-100 text-red-800 border border-red-300">Minimization / Summary</span>
      </div>

      {/* ---- Sections rendered from data ---- */}
      {AUTOMATA_DATA.map((sec) => (
        <Section key={sec.id} data={sec} />
      ))}

      {/* ---- Footer ---- */}
      <footer className="text-center mt-12 pb-6">
        <p className="text-slate-600 font-medium">Crafted with love by <span className="font-bold text-slate-800">ZenYukti</span></p>
        <p className="text-slate-400 text-sm mt-1 italic">Learn. Build. Share.</p>
      </footer>
    </div>
  );
};

/* ---- Mount ---- */
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
