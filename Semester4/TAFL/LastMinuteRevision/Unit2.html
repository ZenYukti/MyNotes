/* ---- Convert **bold**, *italic*, and $LaTeX$ in a string to HTML ---- */
const renderText = (text) => {
  let html = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*([^*]+?)\*/g, '<em>$1</em>');
  html = html.replace(/\$([^$]+?)\$/g, (_, tex) => {
    try { return katex.renderToString(tex, { throwOnError: false, displayMode: false }); }
    catch (e) { return '$' + tex + '$'; }
  });
  return html;
};

/* ---- Render a single bullet ---- */
const Bullet = ({ text }) => {
  const html = renderText(text);
  if (text.startsWith("|")) {
    return <span className="block font-mono text-sm whitespace-pre" dangerouslySetInnerHTML={{ __html: html }} />;
  }
  /* Indented sub-bullet */
  if (text.startsWith("  ")) {
    return <p className="leading-relaxed ml-5 text-sm" dangerouslySetInnerHTML={{ __html: '◦ ' + html.trim() }} />;
  }
  return <p className="leading-relaxed" dangerouslySetInnerHTML={{ __html: '• ' + html }} />;
};

/* Diagram lookup */
const DIAGRAMS = {
  stateElim: StateElimDiagram,
  ardens: ArdensDiagram,
  kleeneRoadmap: KleeneRoadmap,
  pumping: PumpingDiagram,
};

/* ---- Block = one Box with heading + bullets + optional diagram ---- */
const Block = ({ data }) => {
  const Diagram = data.diagram ? DIAGRAMS[data.diagram] : null;
  return (
    <Box type={data.type} title={data.heading}>
      {Diagram && <Diagram />}
      {data.bullets.map((b, i) => <Bullet key={i} text={b} />)}
    </Box>
  );
};

/* ---- Collapsible Section ---- */
const Section = ({ data }) => {
  const [open, setOpen] = useState(!!data.defaultOpen);
  return (
    <div className="bg-white rounded-lg shadow mb-5 overflow-hidden">
      <button
        onClick={() => setOpen(!open)}
        className="w-full px-5 py-4 bg-slate-800 text-white font-bold text-lg flex items-center justify-between hover:bg-slate-700 transition-colors"
      >
        <span>{data.title}</span>
        {open ? <ChevronDown className="w-5 h-5" /> : <ChevronRight className="w-5 h-5" />}
      </button>
      {open && (
        <div className="p-5">
          {data.blocks.map((b, i) => <Block key={i} data={b} />)}
        </div>
      )}
    </div>
  );
};

      <footer className="text-center mt-12 pb-6">
        <p className="text-slate-600 font-medium">Crafted with love by <span className="font-bold text-slate-800">ZenYukti</span></p>

    </div>

};

/* ---- Mount ---- */
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
